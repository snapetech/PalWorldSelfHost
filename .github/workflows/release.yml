name: Release archive
on:
  push: {tags: ['v*']}
permissions: {contents: write}
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: tar --exclude=.git -czf PalWorldSelfHost-${GITHUB_REF_NAME}.tar.gz .
      - uses: softprops/action-gh-release@v2
        with: {files: 'PalWorldSelfHost-*.tar.gz', generate_release_notes: true}
